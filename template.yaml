AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  tg_summarizer - Telegram channel summarizer with AI-powered summarization
  
Globals:
  Function:
    Timeout: 180
    MemorySize: 1024
    Runtime: python3.12
    Environment:
      Variables:
        OPENAI_MODEL: !Ref OpenAIModel
        OPENAI_DEFAULT_MAX_TOKENS: !Ref OpenAIDefaultMaxTokens
        OPENAI_CHANNEL_SUMMARY_MAX_TOKENS: !Ref OpenAIChannelSummaryMaxTokens
        OPENAI_GROUP_SUMMARY_MAX_TOKENS: !Ref OpenAIGroupSummaryMaxTokens
        OPENAI_REQUEST_TIMEOUT: !Ref OpenAIRequestTimeout
        OPENAI_SUMMARY_TEMPERATURE: !Ref OpenAISummaryTemperature
        UPDATE_SUMMARY_MAX_TOKENS: !Ref UpdateSummaryMaxTokens
        UPDATE_SUMMARY_MAX_INPUT_CHARS: !Ref UpdateSummaryMaxInputChars
        UPDATE_MATCH_MAX_SUMMARIES: !Ref UpdateMatchMaxSummaries
        UPDATE_MATCH_MAX_CHARS_PER_SUMMARY: !Ref UpdateMatchMaxCharsPerSummary
        NLP_CHECK_MAX_INPUT_CHARS: !Ref NlpCheckMaxInputChars
        COVERAGE_CHECK_MAX_INPUT_CHARS: !Ref CoverageCheckMaxInputChars
        NLP_MIN_TEXT_LENGTH: !Ref NlpMinTextLength
        MAX_MESSAGES_PER_SOURCE: !Ref MaxMessagesPerSource
        FETCH_EXAMINED_MULTIPLIER: !Ref FetchExaminedMultiplier
        SUMMARY_MAX_INPUT_CHARS_PER_MESSAGE: !Ref SummaryMaxInputCharsPerMessage
        NLP_CONCURRENT_CHECKS: !Ref NlpConcurrentChecks
        ENABLE_SUMMARIES_DEDUPLICATION: !Ref EnableSummariesDeduplication
        ENABLE_SUMMARY_UPDATES: !Ref EnableSummaryUpdates
        SIMILARITY_LLM_UPPER: !Ref SimilarityLlmUpper
        MAX_COVERED_MESSAGE_UPDATES: !Ref MaxCoveredMessageUpdates
        MAX_CHANNEL_HISTORY_MESSAGES: !Ref MaxChannelHistoryMessages
        MAX_CHANNEL_SUMMARIES: !Ref MaxChannelSummaries
        MAX_GROUP_HISTORY_MESSAGES: !Ref MaxGroupHistoryMessages
        MAX_GROUP_SUMMARIES: !Ref MaxGroupSummaries
        GROUP_SUMMARIZATION_INTERVAL_SECONDS: !Ref GroupSummarizationIntervalSeconds
        RESTORE_HISTORY_DAYS: !Ref RestoreHistoryDays
        CIRCUIT_BREAKER_THRESHOLD: !Ref CircuitBreakerThreshold
        CIRCUIT_BREAKER_RESET_SEC: !Ref CircuitBreakerResetSec
        RESTORE_TIMEOUT_SEC: !Ref RestoreTimeoutSec
        TARGET_CHANNEL: !Ref TargetChannel
        SOURCE_CHANNELS: !Ref SourceChannels
        SOURCE_GROUPS: !Ref SourceGroups
        STATE_S3_BUCKET: !Ref StateBucket
        STATE_S3_PREFIX: !Ref StatePrefix
        TELEGRAM_API_ID_SSM_PATH: !Ref TelegramApiIdSsmPath
        TELEGRAM_API_HASH_SSM_PATH: !Ref TelegramApiHashSsmPath
        TELEGRAM_BOT_TOKEN_SSM_PATH: !Ref TelegramBotTokenSsmPath
        OPENAI_API_KEY_SSM_PATH: !Ref OpenAIApiKeySsmPath
        TELEGRAM_API_ID: !If
          - UseSsmTelegramApiId
          - !Sub "{{resolve:ssm:${TelegramApiIdSsmPath}}}"
          - !Ref TelegramApiId
        TELEGRAM_API_HASH: !If
          - UseSsmTelegramApiHash
          - !Sub "{{resolve:ssm:${TelegramApiHashSsmPath}}}"
          - !Ref TelegramApiHash
        TELEGRAM_BOT_TOKEN: !If
          - UseSsmTelegramBotToken
          - !Sub "{{resolve:ssm:${TelegramBotTokenSsmPath}}}"
          - !Ref TelegramBotToken
        OPENAI_API_KEY: !If
          - UseSsmOpenAIApiKey
          - !Sub "{{resolve:ssm:${OpenAIApiKeySsmPath}}}"
          - !Ref OpenAIApiKey

Parameters:
  TelegramApiId:
    Type: String
    Description: Telegram API ID from my.telegram.org
    NoEcho: true
  
  TelegramApiHash:
    Type: String
    Description: Telegram API Hash from my.telegram.org
    NoEcho: true
  
  TelegramBotToken:
    Type: String
    Description: Telegram Bot token from BotFather
    NoEcho: true
  
  OpenAIApiKey:
    Type: String
    Description: OpenAI API key
    NoEcho: true
  
  TargetChannel:
    Type: String
    Description: Target Telegram channel for summaries (e.g., @dstgsum)
    Default: "@dstgsum"
  
  SourceChannels:
    Type: String
    Description: Comma-separated list of source Telegram channels
    Default: ""
  
  SourceGroups:
    Type: String
    Description: Comma-separated list of source Telegram groups
    Default: ""
  
  OpenAIModel:
    Type: String
    Description: OpenAI model to use
    Default: "gpt-4.1-nano"
    AllowedValues:
      - "gpt-4.1-nano"
      - "gpt-4o-mini"
      - "gpt-4.1-mini"
  
  OpenAIDefaultMaxTokens:
    Type: String
    Description: Default max tokens for OpenAI
    Default: "300"
  
  OpenAIChannelSummaryMaxTokens:
    Type: String
    Description: Max tokens for channel summaries
    Default: "1500"
   
  OpenAIGroupSummaryMaxTokens:
    Type: String
    Description: Max tokens for group summaries
    Default: "4000"
  
  OpenAIRequestTimeout:
    Type: String
    Description: Timeout in seconds for each OpenAI API request
    Default: "30"
   
  OpenAISummaryTemperature:
    Type: String
    Description: Temperature for summary generation (lower = more concise/consistent)
    Default: "0.1"
   
  UpdateSummaryMaxTokens:
    Type: String
    Description: Max tokens for summary update LLM calls (link insertion)
    Default: "1000"
   
  UpdateSummaryMaxInputChars:
    Type: String
    Description: Max chars of summary content sent to update LLM call
    Default: "1000"
  
  UpdateMatchMaxSummaries:
    Type: String
    Description: Max number of recent summaries sent to coverage+match check
    Default: "5"
  
  UpdateMatchMaxCharsPerSummary:
    Type: String
    Description: Max chars per summary in coverage+match context
    Default: "500"
    
  NlpCheckMaxInputChars:
    Type: String
    Description: Max chars of message text sent to NLP relevance check
    Default: "500"
  
  CoverageCheckMaxInputChars:
    Type: String
    Description: Max chars of message text sent to coverage+match check
    Default: "500"
    
  NlpMinTextLength:
    Type: String
    Description: Minimum text length (chars) for NLP relevance check to run
    Default: "100"
  
  MaxMessagesPerSource:
    Type: String
    Description: Max new messages to fetch per source channel/group
    Default: "100"
  
  FetchExaminedMultiplier:
    Type: String
    Description: Multiplier for max messages examined per source (examined = new * multiplier)
    Default: "3"
    
  SummaryMaxInputCharsPerMessage:
    Type: String
    Description: Max chars of each message sent to summary LLM
    Default: "2000"
   
  NlpConcurrentChecks:
    Type: String
    Description: Max concurrent NLP relevance checks (OpenAI API calls)
    Default: "5"
  
  EnableSummariesDeduplication:
    Type: String
    Description: Enable coverage deduplication against previous summaries
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  
  EnableSummaryUpdates:
    Type: String
    Description: Enable updating existing summaries with new covered messages
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  
  SimilarityLlmUpper:
    Type: String
    Description: SequenceMatcher ratio threshold above which messages are considered near-duplicates
    Default: "0.95"
  
  MaxCoveredMessageUpdates:
    Type: String
    Description: Max number of covered-message summary updates per invocation
    Default: "5"
  
  MaxChannelHistoryMessages:
    Type: String
    Description: Max processed message IDs retained in channel history
    Default: "1000"
  
  MaxChannelSummaries:
    Type: String
    Description: Max summaries retained in channel summaries history
    Default: "50"
  
  MaxGroupHistoryMessages:
    Type: String
    Description: Max processed message IDs retained in group history
    Default: "1000"
  
  MaxGroupSummaries:
    Type: String
    Description: Max summaries retained in group summaries history
    Default: "100"
  
  GroupSummarizationIntervalSeconds:
    Type: String
    Description: Minimum seconds between group summarization runs
    Default: "86400"
  
  RestoreHistoryDays:
    Type: String
    Description: Number of days to look back when restoring summaries from channel
    Default: "7"
   
  CircuitBreakerThreshold:
    Type: String
    Description: Number of consecutive OpenAI failures before circuit breaker opens
    Default: "3"
   
  CircuitBreakerResetSec:
    Type: String
    Description: Seconds before circuit breaker allows a probe call (half-open)
    Default: "60"
  
  RestoreTimeoutSec:
    Type: String
    Description: Timeout in seconds for channel restore from Telegram
    Default: "30"
  
  StateBucket:
    Type: String
    Description: S3 bucket for state persistence (leave empty for no persistence)
    Default: ""
  
  StatePrefix:
    Type: String
    Description: S3 prefix for state files
    Default: "tg_summarizer/prod"
  
  ScheduleExpression:
    Type: String
    Description: EventBridge schedule expression
    Default: "cron(0 9 * * ? *)"
  
  EnableTelegramSend:
    Type: String
    Description: Enable sending summaries to Telegram (set to false for testing)
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  
  TelegramApiIdSsmPath:
    Type: String
    Description: SSM Parameter Store path for Telegram API ID (takes precedence over TelegramApiId)
    Default: ""
  
  TelegramApiHashSsmPath:
    Type: String
    Description: SSM Parameter Store path for Telegram API Hash (takes precedence over TelegramApiHash)
    Default: ""
  
  TelegramBotTokenSsmPath:
    Type: String
    Description: SSM Parameter Store path for Telegram Bot Token (takes precedence over TelegramBotToken)
    Default: ""
  
  OpenAIApiKeySsmPath:
    Type: String
    Description: SSM Parameter Store path for OpenAI API Key (takes precedence over OpenAIApiKey)
    Default: ""
  
  WarmupScheduleExpression:
    Type: String
    Description: EventBridge schedule for Lambda warmup (leave empty to disable)
    Default: ""

Conditions:
  HasStateBucket: !Not [!Equals [!Ref StateBucket, ""]]
  HasWarmupSchedule: !Not [!Equals [!Ref WarmupScheduleExpression, ""]]
  UseSsmTelegramApiId: !Not [!Equals [!Ref TelegramApiIdSsmPath, ""]]
  UseSsmTelegramApiHash: !Not [!Equals [!Ref TelegramApiHashSsmPath, ""]]
  UseSsmTelegramBotToken: !Not [!Equals [!Ref TelegramBotTokenSsmPath, ""]]
  UseSsmOpenAIApiKey: !Not [!Equals [!Ref OpenAIApiKeySsmPath, ""]]

Resources:
  SummarizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tg-summarizer
      CodeUri: .
      Handler: lambda_handler.handler
      ReservedConcurrentExecutions: 1
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt SummarizerDLQ.Arn
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref StateBucket
        - S3WritePolicy:
            BucketName: !Ref StateBucket
        - SQSSendMessagePolicy:
            QueueName: !GetAtt SummarizerDLQ.QueueName
        - !If
          - UseSsmTelegramApiId
          - Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${TelegramApiIdSsmPath}"
          - !Ref AWS::NoValue
        - !If
          - UseSsmTelegramApiHash
          - Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${TelegramApiHashSsmPath}"
          - !Ref AWS::NoValue
        - !If
          - UseSsmTelegramBotToken
          - Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${TelegramBotTokenSsmPath}"
          - !Ref AWS::NoValue
        - !If
          - UseSsmOpenAIApiKey
          - Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${OpenAIApiKeySsmPath}"
          - !Ref AWS::NoValue
      Events:
        ScheduledRun:
          Type: Schedule
          Properties:
            Schedule: !Ref ScheduleExpression
            Input:
              Fn::Sub: >
                {
                  "send_message": "${EnableTelegramSend}",
                  "save_changes": true,
                  "include_today_processed_groups": false,
                  "include_today_processed_messages": false
                }
        WarmupRun:
          Type: Schedule
          Condition: HasWarmupSchedule
          Properties:
            Schedule: !Ref WarmupScheduleExpression
            Input: '{"warmup": true}'

  StateBucket:
    Type: AWS::Serverless::SimpleBucket
    Condition: HasStateBucket
    Properties:
      BucketName: !Ref StateBucket

  SummarizerDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-dlq"
      MessageRetentionPeriod: 1209600

  # CloudWatch Alarms for Lambda monitoring
  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-lambda-errors"
      AlarmDescription: "Alarm for tg_summarizer Lambda errors"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      Threshold: 0
      MetricName: Errors
      Namespace: AWS/Lambda
      Period: 300
      Statistic: Sum
      Dimensions:
        - Name: FunctionName
          Value: !Ref SummarizerFunction
      TreatMissingData: notBreaching

  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-lambda-duration"
      AlarmDescription: "Alarm for tg_summarizer Lambda duration approaching timeout"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 2
      Threshold: 150
      MetricName: Duration
      Namespace: AWS/Lambda
      Period: 300
      Statistic: Average
      Dimensions:
        - Name: FunctionName
          Value: !Ref SummarizerFunction
      TreatMissingData: notBreaching

  LambdaThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-lambda-throttles"
      AlarmDescription: "Alarm for tg_summarizer Lambda throttles"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      Threshold: 0
      MetricName: Throttles
      Namespace: AWS/Lambda
      Period: 300
      Statistic: Sum
      Dimensions:
        - Name: FunctionName
          Value: !Ref SummarizerFunction
      TreatMissingData: notBreaching

  OpenAILatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-openai-latency"
      AlarmDescription: "Alarm for high OpenAI API latency (EMF metric from call_openai)"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 2
      Threshold: 20
      MetricName: Latency
      Namespace: tg_summarizer/OpenAI
      Period: 300
      Statistic: Average
      Dimensions:
        - Name: Function
          Value: !Ref SummarizerFunction
      TreatMissingData: notBreaching

  OpenAICostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-openai-cost"
      AlarmDescription: "Alarm for high OpenAI estimated cost per invocation (EMF metric from call_openai)"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      Threshold: 0.10
      MetricName: EstimatedCostUSD
      Namespace: tg_summarizer/OpenAI
      Period: 300
      Statistic: Maximum
      Dimensions:
        - Name: Function
          Value: !Ref SummarizerFunction
      TreatMissingData: notBreaching

  OpenAIDailyCostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-openai-daily-cost"
      AlarmDescription: "Alarm for daily OpenAI estimated cost exceeding budget (EMF metric from lambda_handler)"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      Threshold: 1.0
      MetricName: CumulativeCostUSD
      Namespace: tg_summarizer/Invocation
      Period: 86400
      Statistic: Sum
      Dimensions:
        - Name: Function
          Value: !Ref SummarizerFunction
      TreatMissingData: notBreaching

  NlpCheckCostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-nlp-check-cost"
      AlarmDescription: "Alarm for high NLP check estimated cost (EMF metric EstimatedCostUSD with CallType=nlp, 24h sum)"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      Threshold: 0.05
      MetricName: EstimatedCostUSD
      Namespace: tg_summarizer/OpenAI
      Period: 86400
      Statistic: Sum
      Dimensions:
        - Name: Function
          Value: !Ref SummarizerFunction
        - Name: CallType
          Value: nlp
      TreatMissingData: notBreaching

  SummaryCostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-summary-cost"
      AlarmDescription: "Alarm for high summary generation estimated cost (channel_summary + group_summary, 24h sum)"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      Threshold: 0.50
      Metrics:
        - Id: m1
          MetricStat:
            Metric:
              Namespace: tg_summarizer/OpenAI
              MetricName: EstimatedCostUSD
              Dimensions:
                - Name: Function
                  Value: !Ref SummarizerFunction
                - Name: CallType
                  Value: channel_summary
            Period: 86400
            Stat: Sum
          ReturnData: false
        - Id: m2
          MetricStat:
            Metric:
              Namespace: tg_summarizer/OpenAI
              MetricName: EstimatedCostUSD
              Dimensions:
                - Name: Function
                  Value: !Ref SummarizerFunction
                - Name: CallType
                  Value: group_summary
            Period: 86400
            Stat: Sum
          ReturnData: false
        - Id: e1
          Expression: "m1 + m2"
          Label: "Summary Cost (24h)"
          ReturnData: true
      TreatMissingData: notBreaching

  UpdateCostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-update-cost"
      AlarmDescription: "Alarm for high summary update estimated cost (EMF metric EstimatedCostUSD with CallType=update, 24h sum)"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      Threshold: 0.10
      MetricName: EstimatedCostUSD
      Namespace: tg_summarizer/OpenAI
      Period: 86400
      Statistic: Sum
      Dimensions:
        - Name: Function
          Value: !Ref SummarizerFunction
        - Name: CallType
          Value: update
      TreatMissingData: notBreaching

  S3UploadFailuresAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasStateBucket
    Properties:
      AlarmName: !Sub "${AWS::StackName}-s3-upload-failures"
      AlarmDescription: "Alarm for S3 state upload failures detected via Lambda logs"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      Threshold: 0
      MetricName: S3UploadFailures
      Namespace: tg_summarizer/S3
      Period: 300
      Statistic: Sum
      Dimensions:
        - Name: Function
          Value: !Ref SummarizerFunction
      TreatMissingData: notBreaching

  CircuitBreakerHalfOpenAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-circuit-breaker-half-open"
      AlarmDescription: "Alarm for circuit breaker entering half-open state (EMF metric CircuitBreakerState >= 1)"
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      Threshold: 1
      MetricName: CircuitBreakerState
      Namespace: tg_summarizer/Invocation
      Period: 300
      Statistic: Maximum
      Dimensions:
        - Name: Function
          Value: !Ref SummarizerFunction
      TreatMissingData: notBreaching

  DLQDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-dlq-depth"
      AlarmDescription: "Alarm for messages piling up in the dead-letter queue"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      Threshold: 0
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Period: 300
      Statistic: Sum
      Dimensions:
        - Name: QueueName
          Value: !GetAtt SummarizerDLQ.QueueName
      TreatMissingData: notBreaching

  DLQAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-dlq-age"
      AlarmDescription: "Alarm for messages sitting in the dead-letter queue for over 1 hour"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      Threshold: 3600
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Period: 300
      Statistic: Maximum
      Dimensions:
        - Name: QueueName
          Value: !GetAtt SummarizerDLQ.QueueName
      TreatMissingData: notBreaching

  DeadMansSwitchAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-dead-mans-switch"
      AlarmDescription: "Alarm when Lambda has not been invoked in 24 hours (dead man's switch)"
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      Threshold: 1
      MetricName: Invocations
      Namespace: AWS/Lambda
      Period: 86400
      Statistic: Sum
      Dimensions:
        - Name: FunctionName
          Value: !Ref SummarizerFunction
      TreatMissingData: breaching

  WarmupFailuresAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasWarmupSchedule
    Properties:
      AlarmName: !Sub "${AWS::StackName}-warmup-failures"
      AlarmDescription: "Alarm for Lambda warmup failures (EMF metric Success=0 from warmup handler)"
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 2
      Threshold: 0
      MetricName: Success
      Namespace: tg_summarizer/Warmup
      Period: 300
      Statistic: Minimum
      Dimensions:
        - Name: Function
          Value: !Ref SummarizerFunction
      TreatMissingData: notBreaching

  SummarizerDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${AWS::StackName}-dashboard"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["tg_summarizer/Invocation", "CumulativeCostUSD", "Function", "${SummarizerFunction}"],
                  ["tg_summarizer/Invocation", "CumulativePromptTokens", "Function", "${SummarizerFunction}"],
                  ["tg_summarizer/Invocation", "CumulativeCompletionTokens", "Function", "${SummarizerFunction}"]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Per-Invocation Cost & Tokens",
                "yAxis": { "left": { "label": "USD" }, "right": { "label": "tokens" } }
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["tg_summarizer/OpenAI", "Latency", "Function", "${SummarizerFunction}", "Model", "*", "CallType", "*"],
                  ["tg_summarizer/OpenAI", "EstimatedCostUSD", "Function", "${SummarizerFunction}", "Model", "*", "CallType", "*"]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "OpenAI Latency & Cost",
                "yAxis": { "left": { "label": "seconds" }, "right": { "label": "USD" } }
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["tg_summarizer/OpenAI", "PromptTokens", "Function", "${SummarizerFunction}", "Model", "*", "CallType", "*"],
                  ["tg_summarizer/OpenAI", "CompletionTokens", "Function", "${SummarizerFunction}", "Model", "*", "CallType", "*"]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "OpenAI Token Usage"
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "${SummarizerFunction}"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${SummarizerFunction}"],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${SummarizerFunction}"],
                  ["AWS/Lambda", "Throttles", "FunctionName", "${SummarizerFunction}"]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Lambda Metrics"
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["tg_summarizer/Warmup", "Success", "Function", "${SummarizerFunction}"],
                  ["tg_summarizer/Warmup", "ElapsedSeconds", "Function", "${SummarizerFunction}"]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "Warmup Status",
                "yAxis": { "left": { "label": "success (0/1)" }, "right": { "label": "seconds" } }
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["tg_summarizer/Coverage", "CoveredMessages", "Function", "${SummarizerFunction}", "StreamType", "channel"],
                  ["tg_summarizer/Coverage", "NewMessages", "Function", "${SummarizerFunction}", "StreamType", "channel"],
                  ["tg_summarizer/Coverage", "TotalNlpMessages", "Function", "${SummarizerFunction}", "StreamType", "channel"]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Coverage Dedup (Channel)",
                "yAxis": { "left": { "label": "messages" } }
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["tg_summarizer/Coverage", "CoveredMessages", "Function", "${SummarizerFunction}", "StreamType", "group"],
                  ["tg_summarizer/Coverage", "NewMessages", "Function", "${SummarizerFunction}", "StreamType", "group"],
                  ["tg_summarizer/Coverage", "TotalNlpMessages", "Function", "${SummarizerFunction}", "StreamType", "group"]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Coverage Dedup (Group)",
                "yAxis": { "left": { "label": "messages" } }
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["tg_summarizer/Invocation", "CircuitBreakerState", "Function", "${SummarizerFunction}"]
                ],
                "period": 300,
                "stat": "Maximum",
                "region": "${AWS::Region}",
                "title": "Circuit Breaker State",
                "yAxis": { "left": { "label": "state (0=closed, 1=half_open, 2=open)" } }
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["tg_summarizer/S3", "S3UploadedFiles", "Function", "${SummarizerFunction}"],
                  ["tg_summarizer/S3", "S3UploadFailures", "Function", "${SummarizerFunction}"]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "S3 State Sync",
                "yAxis": { "left": { "label": "files" } }
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["tg_summarizer/NLP", "Accepted", "Function", "${SummarizerFunction}", "StreamType", "channel"],
                  ["tg_summarizer/NLP", "Rejected", "Function", "${SummarizerFunction}", "StreamType", "channel"],
                  ["tg_summarizer/NLP", "AdFiltered", "Function", "${SummarizerFunction}", "StreamType", "channel"],
                  ["tg_summarizer/NLP", "ShortFiltered", "Function", "${SummarizerFunction}", "StreamType", "channel"],
                  ["tg_summarizer/NLP", "CbFiltered", "Function", "${SummarizerFunction}", "StreamType", "channel"]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "NLP Filter (Channel)",
                "yAxis": { "left": { "label": "messages" } }
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["tg_summarizer/NLP", "Accepted", "Function", "${SummarizerFunction}", "StreamType", "group"],
                  ["tg_summarizer/NLP", "Rejected", "Function", "${SummarizerFunction}", "StreamType", "group"],
                  ["tg_summarizer/NLP", "AdFiltered", "Function", "${SummarizerFunction}", "StreamType", "group"],
                  ["tg_summarizer/NLP", "ShortFiltered", "Function", "${SummarizerFunction}", "StreamType", "group"],
                  ["tg_summarizer/NLP", "CbFiltered", "Function", "${SummarizerFunction}", "StreamType", "group"]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "NLP Filter (Group)",
                "yAxis": { "left": { "label": "messages" } }
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["tg_summarizer/OpenAI", "EstimatedCostUSD", "Function", "${SummarizerFunction}", "Model", "*", "CallType", "nlp"],
                  ["tg_summarizer/OpenAI", "EstimatedCostUSD", "Function", "${SummarizerFunction}", "Model", "*", "CallType", "coverage"],
                  ["tg_summarizer/OpenAI", "EstimatedCostUSD", "Function", "${SummarizerFunction}", "Model", "*", "CallType", "channel_summary"],
                  ["tg_summarizer/OpenAI", "EstimatedCostUSD", "Function", "${SummarizerFunction}", "Model", "*", "CallType", "group_summary"],
                  ["tg_summarizer/OpenAI", "EstimatedCostUSD", "Function", "${SummarizerFunction}", "Model", "*", "CallType", "update"]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Cost by Call Type",
                "yAxis": { "left": { "label": "USD" } }
              },
              "width": 12, "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["AWS/SQS", "ApproximateAgeOfOldestMessage", "QueueName", "${SummarizerDLQ.QueueName}"],
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${SummarizerDLQ.QueueName}"]
                ],
                "period": 300,
                "stat": "Maximum",
                "region": "${AWS::Region}",
                "title": "DLQ Age & Depth",
                "yAxis": { "left": { "label": "seconds" }, "right": { "label": "messages" } }
              },
              "width": 12, "height": 6
            }
          ]
        }

Outputs:
  SummarizerFunctionArn:
    Description: "Lambda Function ARN"
    Value: !GetAtt SummarizerFunction.Arn
  
  SummarizerFunctionName:
    Description: "Lambda Function Name"
    Value: !Ref SummarizerFunction
  
  StateBucketName:
    Description: "S3 Bucket for state persistence"
    Value: !Ref StateBucket
    Condition: HasStateBucket
